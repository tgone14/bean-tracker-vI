<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bean - Dialysis Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .bean-gradient { background: linear-gradient(135deg, #7c9aff 0%, #a881e6 100%); }
        .progress-bar-bg { background-color: #f1f5f9; border-radius: 9999px; height: 0.6rem; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .label-text { font-size: 0.75rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
        .value-text { font-size: 0.75rem; font-weight: 700; color: #1e293b; }
    </style>
</head>
<body class="pb-24">
    <header class="bean-gradient text-white pt-12 pb-10 px-6 shadow-md rounded-b-[40px] mb-6 text-center relative">
        <button onclick="toggleLanguage()" id="lang-btn" class="absolute top-4 right-4 bg-white/20 backdrop-blur-md border border-white/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider text-white">Español</button>
        <h1 class="text-5xl font-extrabold tracking-tight">Bean</h1>
        <p class="text-sm font-medium opacity-80 mt-2" id="current-date"></p>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <section class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Net Daily Intake</h2>
                <button onclick="exportData()" class="text-[10px] bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold uppercase">Export</button>
            </div>
            <div class="space-y-6">
                <div><div class="flex justify-between mb-2"><span class="label-text">Potassium</span><span class="value-text"><span id="total-k">0</span> / 2000 mg</span></div><div class="progress-bar-bg"><div id="bar-k" class="progress-fill" style="width: 0%; background-color: #34d399;"></div></div></div>
                <div><div class="flex justify-between mb-2"><span class="label-text">Phosphorus</span><span class="value-text"><span id="total-p">0</span> / 1000 mg</span></div><div class="progress-bar-bg"><div id="bar-p" class="progress-fill" style="width: 0%; background-color: #a78bfa;"></div></div></div>
                <div><div class="flex justify-between mb-2"><span class="label-text">Fluid</span><span class="value-text"><span id="total-f">0</span> / 1000 ml</span></div><div class="progress-bar-bg"><div id="bar-f" class="progress-fill" style="width: 0%; background-color: #38bdf8;"></div></div></div>
                <div><div class="flex justify-between mb-2"><span class="label-text">Protein</span><span class="value-text"><span id="total-pr">0</span> / 60 g</span></div><div class="progress-bar-bg"><div id="bar-pr" class="progress-fill" style="width: 0%; background-color: #3b82f6;"></div></div></div>
            </div>
        </section>

        <section id="scanner-section" class="card p-4 hidden">
            <div id="reader" style="width: 100%; border-radius: 16px; overflow: hidden;"></div>
            <div id="scanner-result-area" class="mt-4">
                <div id="scanner-warning" class="hidden p-4 rounded-2xl bg-red-100 text-red-600 text-center font-black text-2xl">✕ PHOSPHATE FOUND</div>
                <div id="scanner-success" class="hidden p-4 rounded-2xl bg-green-100 text-green-700 text-center font-black text-2xl">● NO PHOSPHATES</div>
                <div id="scanner-unknown" class="hidden p-4 rounded-2xl bg-amber-100 text-amber-700 text-center font-bold text-lg">⚠️ NOT FOUND</div>
            </div>
            <button onclick="stopScanner()" class="w-full mt-4 py-2 bg-slate-100 text-xs text-slate-500 font-bold uppercase rounded-xl">Close Scanner</button>
        </section>

        <section class="card p-5 space-y-4">
            <button onclick="startScanner()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Scan Barcode for Additives</button>
            <div class="relative">
                <input type="text" id="food-search" placeholder="Search foods..." class="w-full p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-purple-200">
                <div id="search-results" class="hidden absolute z-30 w-full bg-white border rounded-2xl shadow-2xl mt-2 max-h-72 overflow-y-auto"></div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center px-2 mb-4">
                <h2 class="text-xl font-bold text-slate-800">Today's History</h2>
                <button onclick="clearLog()" class="text-[10px] text-red-400 font-bold uppercase">Reset</button>
            </div>
            <ul id="log-list" class="space-y-3"></ul>
        </section>
    </main>

    <script>
    const phosphateAdditives = ["phosphoric acid","sodium aluminum phosphate","pyrophosphate","polyphosphate","triphosphate","trimetaphosphate","hexametaphosphate","dicalcium phosphate","monocalcium phosphate","tricalcium phosphate","soy lecithin","lecithin"];
    let html5QrCode;
    let isProcessing = false;
    let dailyLog = JSON.parse(localStorage.getItem("bean_log_v2")) || [];

    function updateUI() {
        let tk=0, tp=0, tf=0, tpr=0;
        dailyLog.forEach(i => { 
            tk += (i.k || 0); 
            tp += (i.p || 0); 
            tf += (i.f || 0); 
            tpr += (i.pr || 0); 
        });
        document.getElementById("total-k").textContent = tk.toFixed(0);
        document.getElementById("total-p").textContent = tp.toFixed(0);
        document.getElementById("total-f").textContent = tf.toFixed(0);
        document.getElementById("total-pr").textContent = tpr.toFixed(0);
        
        document.getElementById("bar-k").style.width = Math.min((tk/2000)*100, 100) + "%";
        document.getElementById("bar-p").style.width = Math.min((tp/1000)*100, 100) + "%";
        document.getElementById("bar-f").style.width = Math.min((tf/1000)*100, 100) + "%";
        document.getElementById("bar-pr").style.width = Math.min((tpr/60)*100, 100) + "%";

        const list = document.getElementById("log-list");
        list.innerHTML = dailyLog.length ? dailyLog.map(i => `<li class="p-4 card flex justify-between items-center"><span>${i.name}</span><span class="font-bold">${i.p}mg P</span></li>`).reverse().join('') : '<li class="text-center text-slate-400 py-8">No entries yet</li>';
    }

    function startScanner() {
        resetScannerUI();
        document.getElementById("scanner-section").classList.remove("hidden");
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess)
            .catch(err => alert("Camera access denied"));
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        resetScannerUI();
        fetch(`https://world.openfoodfacts.org/api/v0/product/${decodedText}.json`)
            .then(r => r.json())
            .then(data => {
                if (data.status === 1 && data.product.ingredients_text) {
                    const text = data.product.ingredients_text.toLowerCase();
                    const found = phosphateAdditives.some(a => text.includes(a)) || text.includes("phos");
                    document.getElementById(found ? "scanner-warning" : "scanner-success").classList.remove("hidden");
                } else {
                    document.getElementById("scanner-unknown").classList.remove("hidden");
                }
            })
            .catch(() => document.getElementById("scanner-unknown").classList.remove("hidden"))
            .finally(() => setTimeout(() => { isProcessing = false; }, 3000));
    }

    function resetScannerUI() {
        ["scanner-warning","scanner-success","scanner-unknown"].forEach(id => {
            document.getElementById(id).classList.add("hidden");
        });
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.getState() > 1) {
            html5QrCode.stop().then(() => {
                document.getElementById("scanner-section").classList.add("hidden");
            });
        } else {
            document.getElementById("scanner-section").classList.add("hidden");
        }
    }

    function clearLog() {
        if(confirm("Clear today's log?")) {
            dailyLog = [];
            localStorage.setItem("bean_log_v2", "[]");
            updateUI();
        }
    }

    function exportData() { alert(JSON.stringify(dailyLog, null, 2)); }
    function toggleLanguage() { alert("Language toggle feature restored - localization implementation in progress."); }

    document.getElementById("current-date").textContent = new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
    updateUI();
    </script>
</body>
</html>
